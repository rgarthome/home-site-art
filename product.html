<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Produs | Art Home</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <header>
  <div class="nav">
    <a class="brand" href="index.html">
      <img src="logo.jpg" alt="Art Home logo">
      <span>Art Home</span>
    </a>

    <nav>
      <a href="index.html#produse">Produse</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>
</header>

  <main class="page">
    <div class="feed-status" id="feedStatus">Se încarcă produsul...</div>

    <div class="breadcrumb">
      <a href="index.html">Acasă</a> /
      <span id="productCategory"></span> /
      <span id="productBreadcrumbName"></span>
    </div>

    <div class="product-page">
      <div class="product-image" id="productImage"></div>

      <div class="product-info">
        <div class="badge">Recomandare afiliere</div>

        <h1 id="productTitle"></h1>
        <p class="lead" id="productDescription"></p>

        <div class="price" id="productPrice"></div>
        <div class="meta" id="productBrand"></div>

        <ul class="benefits" id="productBenefits"></ul>

        <div class="product-box">
          <p>Produs importat din feed 2Performant.</p>

          <br>

          <a class="btn btn-primary" id="affiliateButton" href="#" target="_blank" rel="nofollow sponsored noopener">
            Cumpără prin link afiliat
          </a>

          <a class="btn btn-secondary" href="index.html#produse">Înapoi</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Art Home</p>
  </footer>

  <button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-widget" id="chatWidget">
  <div class="chat-header">
    <div>
      <strong>Asistent Art Home</strong><br>
      <span>Te ajut să găsești produse</span>
    </div>

    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      Bună! Cu ce te pot ajuta?
    </div>
  </div>

  <form class="chat-form" onsubmit="sendMessage(event)">
    <input id="chatInput" type="text" placeholder="Scrie aici...">
    <button type="submit">Trimite</button>
  </form>
</div>

  <script src="assets/js/app.js"></script>
</body>
</html>
